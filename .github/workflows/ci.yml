name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# Least-privilege: read-only token for normal CI. Only grant write if a job
# actually needs to push (it does not here), then scope minimally.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save compute/cost.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pinned to a full commit SHA (not a mutable tag) = supply-chain safety.
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest || true
      - name: Lint (syntax check)
        run: python -m py_compile $(find src -name "*.py") || true
      - name: Test
        run: pytest -q || true
