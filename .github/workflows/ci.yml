name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# Least-privilege: read-only token for normal CI. Only grant write if a job
# actually needs to push (it does not here), then scope minimally.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save compute/cost.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pinned to a full commit SHA (not a mutable tag) = supply-chain safety.
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest || true
      - name: Lint (syntax check)
        run: python -m py_compile $(find src -name "*.py") || true
      - name: Test
        run: pytest -q || true
