version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Require CI to pass before auto-merge of patch/minor updates.
    groups:
      actions-minor:
        update-types: ["minor", "patch"]
